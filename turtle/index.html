<!doctype html><html lang="en"><head><meta charset="UTF-8"><title>WebLogo</title><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><link rel="icon" type="image/png" href="images/logo-32px.png"><link rel="stylesheet" href="dist/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><script src="lib/libgif-js/libgif.js"></script><script src="lib/jsgif/jsgif.min.js"></script><script src="https://stuk.github.io/jszip/dist/jszip.js" type="text/javascript"></script><script type="module" src="modules/script.js"></script></head><body><div id="container"><nav id="menu-bar"><ul><li>Drawing<ul><li id="drawing-download">Download</li></ul></li><li id="set-menu">Set<ul><li id="set-animation-time"><span class="fa fa-clock"></span>Animation Time</li></ul></li><li>Zoom<ul><li id="zoom-in" title="Zoom in on the drawing">In</li><li id="zoom-out" title="Zoom out of the drawing">Out</li><li id="zoom-normal" title="Restore the initial zoom on the drawing">Normal</li></ul></li><li>Debugging<ul><li id="debugging-execution-speed-item" class="select-container"><select name="execution-speed" id="debugging-execution-speed" title="Select how fast you want the Logo code to execute"></select></li></ul></li><li>Help<ul><li id="help-index"><span class="weblogo-menu-icon"></span>Index</li></ul></li></ul></nav><div id="graphics-screen" class="unselectable"><div id="graphics-screen-help" class="fa fa-question" data-helpid="graphics-screen"></div><div id="cursor-status"><button id="cursor-status-turtle-camera" title="Center the camera on the turtle"></button> <button id="cursor-status-home-camera" title="Center the camera on origin" class="hidden"></button> <span id="cursor-status-coordinates"></span></div></div><div id="command-box"><div id="toast-message-container"></div><div class="commander-container
