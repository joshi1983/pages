<html lang="en">
	<head>
		<title>Turtle Graphics Fun Translation Prototype</title>
		<base href="../../">
		<link rel="stylesheet" type="text/css" href="./prototypes/turtle-graphics-fun/style.css">
		<link rel="stylesheet" type="text/css" href="./css/debugging/parse-tree-explorer.css">
		<script type="module" src="./prototypes/turtle-graphics-fun/turtle-graphics-fun.js"></script>
	</head>
	<body>
		<p>This is a prototype for interactive testing of Turtle Graphics Fun parsing code from 
		the modules/parsing/turtle-graphics-fun directory.
		Enter Turtle Graphics Fun code here to see the resulting parse tree and 
		translation.
		</p>
		<div class="split">
			<div>
				<div id="code-input-container">
					<div class="scrollable-content">
						<div id="code-input-line-numbers"></div>
						<textarea id="input"></textarea>
					</div>
				</div>
				<div>
					<label for="quality-messages">Quality Messages</label>
					<div id="quality-messages"></div>
				</div>
				<div id="parse-tree-explorer">
					<label for="parse-tree">Parse Tree</label>
					<div id="parse-tree"></div>
				</div>
			</div>
			<div>
				<output id="code-translated"></output>
			</div>
		</div>
	</body>
</html>
