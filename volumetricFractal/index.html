<!DOCTYPE html>
<html lang="en">
	<head>
		<script src="script.js"></script>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
<canvas></canvas>

<script type='glsl/vertex'>
  attribute vec2 coords;
  
  void main(void) {
    gl_Position = vec4(coords.xy, 0.0, 1.0);
  }
</script>

<script type="glsl/fragment">
// <![CDATA[
precision highp float;

uniform vec2 centre;
uniform vec3 position3D;
uniform vec2 viewRotation;
uniform vec2 viewRotation2;
uniform float scale;

float getValue(vec3);

vec3 rotatePoint(vec3 p)
{
	return vec3(
		p.x * viewRotation.x + p.z * viewRotation.y,
		p.y,
		p.z * viewRotation.x - p.x * viewRotation.y
	);
}

float getLightObstruction(vec3 p)
{
	vec3 displacement = vec3(0, -4, 1);
	vec3 position;
	float result = 0.0;
	
	for (float i = 0.01; i < 1.0; i += 0.05)
	{
		result += getValue(vec3(p + i * displacement));
	}
	return min(1.0, result);
}

float getCylinderValue(vec3 p)
{
	float len = length(vec2(p.x, p.y));
	if (len > 0.5)
		return 0.0;
	else
		return (0.5 - len) * 2.0;
}

float getSphereValue(vec3 p)
{
	p.x = p.x * 2.0;
	float len = length(p);
	if (len > 1.0) {
		return 0.0;
	}
	
	return (1.0 - len) / 2.0;
}

float getJuliaSetValue(vec3 p)
{
	float cRe = -0.704029749122184 * p.z * 3.0;
	float cIm = - p.z * 2.0 - 0.3383527246917294;
	float newRe = p.x;
	float newIm = p.y;

	for (float i = 0.02; i < 1.0; i += 0.05)
	{
	  //remember value of previous iteration
	  float oldRe = newRe;
	  float oldIm = newIm;
	  //the actual iteration, the real and imaginary part are calculated
	  newRe = oldRe * oldRe - oldIm * oldIm + cRe;
	  newIm = 2.0 * oldRe * oldIm + cIm;
	  //if the point is outside the circle with radius 2: stop
	  if ((newRe * newRe + newIm * newIm) > 4.0) {
		return i;
	  }
	}

	return 1.0;
}

float getValue(vec3 p)
{
	//return getSphereValue(p);
	return getJuliaSetValue(p);
	//return getCylinderValue(p);
}

vec3 getColourAt(vec3 direction)
{
	vec3 result;
	vec3 gasColour = vec3(1.0, 0.0, 0.0);
	vec3 denseGasColour = vec3(1.0, 1.0, 1.0);
	vec3 mediumGasColour = vec3(1.0, 1.0, 1.0);
	float remainingOpacity = 1.0;
	float scaledI = 0.1;
	float delta = 0.01;
	float totalRatio = 0.0;
	for (float i = 0.01; i < 2.0; i+= 0.01) {
		vec3 point = vec3(position3D + scaledI * direction);
		float density = getValue(point) * 0.5;
		if (density > 0.01) {
			float ratio = remainingOpacity * density;
			vec3 colour;
			if (density > 0.7) {
				colour = ratio * denseGasColour;
			}
			else if (density > 0.1) {
				colour = ratio * mediumGasColour;
			}
			else {
				colour = ratio * gasColour;
			}
			colour *= getLightObstruction(point);
			result += colour;
			totalRatio += ratio;
			remainingOpacity = remainingOpacity * (1.0 - density);
			if (remainingOpacity < 0.01) {
				result = result / totalRatio;
				break;
			}
		}
		scaledI += delta;
	}
	return result * (1.0 - remainingOpacity) / totalRatio;
}

void main(void) {
	vec2 p = gl_FragCoord.xy;
	vec3 direction = vec3((p.x - centre.x) * scale, (p.y - centre.y) * scale, 1.0);
	direction = normalize(direction);
	direction = rotatePoint(direction);
	
	vec3 c = getColourAt(direction);
	gl_FragColor = vec4(c.x, c.y, c.z, 1.0);
}
// ]]>
</script>
	</body>
</html>
